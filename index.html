<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

// ─── Phone Preview Overlay ───────────────────────────────────
const phoneRegistry = [];

function registerPhone(label, dark, children) {
  const idx = phoneRegistry.length;
  phoneRegistry.push({ label, dark, children });
  return idx;
}

function PhonePreviewOverlay({ idx, onClose }) {
  const total = phoneRegistry.length;
  const [cur, setCur] = useState(idx);

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'Escape') onClose();
      if (e.key === 'ArrowLeft') setCur(i => (i - 1 + total) % total);
      if (e.key === 'ArrowRight') setCur(i => (i + 1) % total);
    };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [total]);

  const entry = phoneRegistry[cur];
  if (!entry) return null;

  const NavBtn = ({ dir }) => (
    <button
      onClick={(e) => { e.stopPropagation(); setCur(i => dir === 'prev' ? (i - 1 + total) % total : (i + 1) % total); }}
      style={{
        position: 'absolute', top: '50%', [dir === 'prev' ? 'left' : 'right']: 24,
        transform: 'translateY(-50%)', border: 'none',
        background: 'rgba(255,255,255,0.1)', color: '#fff',
        width: 48, height: 48, borderRadius: 24, cursor: 'pointer',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        transition: 'background 0.15s', fontSize: 0
      }}
      onMouseEnter={e => e.currentTarget.style.background = 'rgba(255,255,255,0.22)'}
      onMouseLeave={e => e.currentTarget.style.background = 'rgba(255,255,255,0.1)'}
    >
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round">
        <path d={dir === 'prev' ? 'M13 4L7 10l6 6' : 'M7 4l6 6-6 6'} />
      </svg>
    </button>
  );

  return ReactDOM.createPortal(
    <div
      onClick={onClose}
      style={{
        position: 'fixed', inset: 0, zIndex: 9999,
        background: 'rgba(18,14,10,0.72)', backdropFilter: 'blur(18px)',
        display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
        gap: 20
      }}
    >
      {/* Phone scaled to fit viewport */}
      <div onClick={e => e.stopPropagation()} style={{ transform: `scale(${Math.min(1, (window.innerHeight - 160) / (PHONE_H + 20))})`, transformOrigin: 'center center' }}>
        <Phone dark={entry.dark}>{entry.children}</Phone>
      </div>

      {/* Label + counter */}
      <div onClick={e => e.stopPropagation()} style={{ color: 'rgba(255,255,255,0.85)', fontFamily: FONT, fontSize: 14, fontWeight: 500, textAlign: 'center', marginTop: -8 }}>
        {entry.label}
        <span style={{ opacity: 0.45, marginLeft: 10, fontVariantNumeric: 'tabular-nums' }}>{cur + 1} / {total}</span>
      </div>

      {/* Dots */}
      <div onClick={e => e.stopPropagation()} style={{ display: 'flex', gap: 7 }}>
        {phoneRegistry.map((_, i) => (
          <button key={i} onClick={() => setCur(i)}
            style={{ border: 'none', padding: 0, cursor: 'pointer', width: 6, height: 6, borderRadius: 3,
              background: i === cur ? '#fff' : 'rgba(255,255,255,0.28)' }} />
        ))}
      </div>

      <NavBtn dir="prev" />
      <NavBtn dir="next" />

      {/* Close */}
      <button onClick={onClose}
        style={{ position: 'absolute', top: 16, right: 20, border: 'none', background: 'transparent',
          color: 'rgba(255,255,255,0.6)', fontSize: 28, cursor: 'pointer', lineHeight: 1, padding: '4px 8px' }}
        onMouseEnter={e => e.currentTarget.style.color = '#fff'}
        onMouseLeave={e => e.currentTarget.style.color = 'rgba(255,255,255,0.6)'}
      >×</button>
    </div>,
    document.body
  );
}

// Wrapper that registers a phone and opens preview on click
function ClickablePhone({ label, dark, children }) {
  const [open, setOpen] = useState(false);
  // Register once — use a ref so it only runs once per mount
  const idxRef = React.useRef(null);
  if (idxRef.current === null) {
    idxRef.current = registerPhone(label, dark, children);
  }
  return (
    <>
      <Phone dark={dark} onClick={() => setOpen(true)} active={open}>{children}</Phone>
      {open && <PhonePreviewOverlay idx={idxRef.current} onClose={() => setOpen(false)} />}
    </>
  );
}

// Wrap a screen with tab bar
const withTabs = (screen, tab) => (
  <div style={{ position: 'relative', height: '100%' }}>
    {screen}
    <TabBar active={tab}/>
  </div>
);

// V1 clickable state manager
function V1App({ flow }) {
  // flow: 'checkin' | 'lead'
  // We render a single "current" screen based on step
  const [step, setStep] = useState(0);
  if (flow === 'checkin') {
    const steps = [
      <V1Home onCheckIn={() => setStep(1)} onLead={() => setStep(4)}/>,
      <V1CheckIn state="out" onBack={() => setStep(0)} onConfirm={() => setStep(2)}/>,
      <V1CheckIn state="in" onBack={() => setStep(0)} onConfirm={() => setStep(3)}/>,
      <V1CheckIn state="success" onBack={() => setStep(0)} onDone={() => setStep(5)}/>,
      <V1LeadDetail onBack={() => setStep(0)} onLogVisit={() => setStep(5)}/>,
      <V1VisitLog onBack={() => setStep(0)} onSave={() => setStep(0)}/>,
    ];
    return withTabs(steps[step], step === 0 ? 'home' : 'leads');
  }
  return null;
}

function V2App({ flow }) {
  const [step, setStep] = useState(0);
  // similar
  return null;
}

const app = (
  <DesignCanvas
    title="Tuoren Medical · Field Sales App"
    subtitle="2 variations · Clickable prototype · Design once, notes for iOS + Android"
  >
    {/* Cover / notes */}
    <DCSection id="intro" title="Design brief">
      <DCArtboard id="brief" label="Brief · read me" width={720} height={520}>

      </DCArtboard>
      <DCArtboard id="system" label="Design system" width={720} height={520}>
        <SystemCard/>
      </DCArtboard>
    </DCSection>

    {/* V1 — Calm Clinical */}
    <DCSection id="v1" title="Variation 1 — Calm Clinical">
      <DCArtboard id="v1-login" label="01 · Login" width={410} height={783}>
        <ClickablePhone label="V1 · 01 · Login"><V1Login onNext={() => {}}/></ClickablePhone>
      </DCArtboard>
      <DCArtboard id="v1-home" label="02 · Dashboard" width={410} height={783}>
        <ClickablePhone label="V1 · 02 · Dashboard">{withTabs(<V1Home/>, 'home')}</ClickablePhone>
      </DCArtboard>
      <DCArtboard id="v1-checkin-out" label="03a · Check-in · outside fence" width={410} height={783}>
        <ClickablePhone label="V1 · 03a · Check-in outside fence"><V1CheckIn state="out"/></ClickablePhone>
      </DCArtboard>
      <DCArtboard id="v1-checkin-in" label="03b · Check-in · inside fence" width={410} height={783}>
        <ClickablePhone label="V1 · 03b · Check-in inside fence"><V1CheckIn state="in"/></ClickablePhone>
      </DCArtboard>
      <DCArtboard id="v1-checkin-ok" label="03c · Check-in · confirmed" width={410} height={783}>
        <ClickablePhone label="V1 · 03c · Check-in confirmed"><V1CheckIn state="success"/></ClickablePhone>
      </DCArtboard>
      <DCArtboard id="v1-leads" label="04 · Leads list" width={410} height={783}>
        <ClickablePhone label="V1 · 04 · Leads list">{withTabs(<V1Leads/>, 'leads')}</ClickablePhone>
      </DCArtboard>
      <DCArtboard id="v1-lead" label="05 · Lead detail" width={410} height={783}>
        <ClickablePhone label="V1 · 05 · Lead detail"><V1LeadDetail/></ClickablePhone>
      </DCArtboard>
      <DCArtboard id="v1-log" label="06 · Visit log" width={410} height={783}>
        <ClickablePhone label="V1 · 06 · Visit log"><V1VisitLog/></ClickablePhone>
      </DCArtboard>
    </DCSection>

    {/* V2 — Field Utility */}
    <DCSection id="v2" title="Variation 2 — Field Utility">
      <DCArtboard id="v2-login" label="01 · Login" width={410} height={783}>
        <ClickablePhone label="V2 · 01 · Login" dark><V2Login/></ClickablePhone>
      </DCArtboard>
      <DCArtboard id="v2-home" label="02 · Dashboard" width={410} height={783}>
        <ClickablePhone label="V2 · 02 · Dashboard">{withTabs(<V2Home/>, 'home')}</ClickablePhone>
      </DCArtboard>
      <DCArtboard id="v2-checkin-out" label="03a · Check-in · outside fence" width={410} height={783}>
        <ClickablePhone label="V2 · 03a · Check-in outside fence"><V2CheckIn state="out"/></ClickablePhone>
      </DCArtboard>
      <DCArtboard id="v2-checkin-in" label="03b · Check-in · swipe to confirm" width={410} height={783}>
        <ClickablePhone label="V2 · 03b · Check-in swipe to confirm"><V2CheckIn state="in"/></ClickablePhone>
      </DCArtboard>
      <DCArtboard id="v2-checkin-ok" label="03c · Check-in · confirmed" width={410} height={783}>
        <ClickablePhone label="V2 · 03c · Check-in confirmed"><V2CheckIn state="success"/></ClickablePhone>
      </DCArtboard>
      <DCArtboard id="v2-leads" label="04 · Leads pipeline" width={410} height={783}>
        <ClickablePhone label="V2 · 04 · Leads pipeline">{withTabs(<V2Leads/>, 'leads')}</ClickablePhone>
      </DCArtboard>
      <DCArtboard id="v2-lead" label="05 · Lead detail" width={410} height={783}>
        <ClickablePhone label="V2 · 05 · Lead detail"><V2LeadDetail/></ClickablePhone>
      </DCArtboard>
      <DCArtboard id="v2-log" label="06 · Visit log" width={410} height={783}>
        <ClickablePhone label="V2 · 06 · Visit log"><V2VisitLog/></ClickablePhone>
      </DCArtboard>
      <DCArtboard id="v2-web" label="07 · Web dashboard" width={1280} height={800}>
        <V2Web/>
      </DCArtboard>
    </DCSection>

  </DesignCanvas>
);

// ─────────────────────────────────────────────────────────────
// Brief + system explainer cards
// ─────────────────────────────────────────────────────────────
function BriefCard() {
  return (
    <div style={{ padding: 40, height: '100%', background: 'white', overflow: 'auto' }}>
      <div style={{ fontFamily: MONO, fontSize: 11, color: T.ink3, letterSpacing: 0.5, textTransform: 'uppercase' }}>
        Tuoren Medical · Gurgaon
      </div>
      <div style={{ fontFamily: FONT, fontSize: 32, fontWeight: 600, color: T.ink, letterSpacing: -0.6, marginTop: 6, lineHeight: 1.15 }}>
        Field Sales app for<br/>the medical devices team
      </div>
      <div style={{ fontFamily: FONT, fontSize: 15, color: T.ink2, marginTop: 14, lineHeight: 1.55, maxWidth: 560 }}>
        Two directions for a sales rep's daily companion. Both cover the priority flow —
        <b> geo-fenced attendance check-in</b> — plus lead pipeline, doctor detail and
        visit logging.
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20, marginTop: 32 }}>
        <BriefBlock
          label="Variation 1"
          title="Calm Clinical"
          body="Generous whitespace. One big primary action per screen. Full-bleed map with bottom sheet. Feels calm and trustworthy — a healthcare app first, sales tool second."
        />
        <BriefBlock
          label="Variation 2"
          title="Field Utility"
          body="Denser layouts. More status pills, quick stats, top-tab navigation. Compact map card + nearby-fence picker + swipe-to-confirm. Built for speed on-the-go."
        />
      </div>

      <div style={{
        marginTop: 28, padding: 16, borderRadius: T.r3,
        background: T.brandSoft, color: T.brandInk,
        fontFamily: FONT, fontSize: 13, lineHeight: 1.5,
      }}>
        <b>Priority flow — geo-fenced check-in:</b> Each screen in row 3 shows a state
        (outside fence → inside fence → confirmed). Reps can only check in when GPS
        places them inside the 200m fence around a listed hospital/office.
      </div>
    </div>
  );
}

function BriefBlock({ label, title, body }) {
  return (
    <div style={{
      padding: 20, borderRadius: T.r3, background: T.surface,
      border: `1px solid ${T.line}`,
    }}>
      <div style={{ fontFamily: MONO, fontSize: 10.5, color: T.brand, letterSpacing: 0.4, textTransform: 'uppercase', fontWeight: 500 }}>{label}</div>
      <div style={{ fontFamily: FONT, fontSize: 20, fontWeight: 600, color: T.ink, letterSpacing: -0.3, marginTop: 6 }}>{title}</div>
      <div style={{ fontFamily: FONT, fontSize: 13.5, color: T.ink2, marginTop: 8, lineHeight: 1.5 }}>{body}</div>
    </div>
  );
}

function SystemCard() {
  const swatches = [
    { name: 'Brand', hex: T.brand, note: 'Primary actions' },
    { name: 'Ink', hex: T.ink, note: 'Body text' },
    { name: 'Success', hex: T.ok, note: 'Inside fence' },
    { name: 'Warn', hex: T.warn, note: 'Outside fence' },
    { name: 'Surface', hex: T.surface, note: 'Cards' },
    { name: 'Line', hex: T.line, note: 'Borders' },
  ];
  return (
    <div style={{ padding: 40, height: '100%', background: 'white', overflow: 'auto' }}>
      <div style={{ fontFamily: MONO, fontSize: 11, color: T.ink3, letterSpacing: 0.5, textTransform: 'uppercase' }}>Design tokens</div>
      <div style={{ fontFamily: FONT, fontSize: 28, fontWeight: 600, color: T.ink, letterSpacing: -0.5, marginTop: 6 }}>
        Clinical, trustworthy, restrained
      </div>

      <div style={{ marginTop: 26 }}>
        <div style={{ fontFamily: FONT, fontSize: 12, fontWeight: 600, color: T.ink3, textTransform: 'uppercase', letterSpacing: 0.4, marginBottom: 12 }}>Palette</div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12 }}>
          {swatches.map(s => (
            <div key={s.name} style={{ border: `1px solid ${T.line}`, borderRadius: T.r3, overflow: 'hidden' }}>
              <div style={{ height: 60, background: s.hex }}/>
              <div style={{ padding: '10px 12px' }}>
                <div style={{ fontFamily: FONT, fontSize: 13, fontWeight: 600, color: T.ink, letterSpacing: -0.1 }}>{s.name}</div>
                <div style={{ fontFamily: MONO, fontSize: 10.5, color: T.ink3, marginTop: 1 }}>{s.note}</div>

            </div>
          ))}

      </div>

      <div style={{ marginTop: 24, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20 }}>
        <div>
          <div style={{ fontFamily: FONT, fontSize: 12, fontWeight: 600, color: T.ink3, textTransform: 'uppercase', letterSpacing: 0.4, marginBottom: 10 }}>Type</div>
          <div style={{ fontFamily: FONT, fontSize: 32, fontWeight: 600, color: T.ink, letterSpacing: -0.6, lineHeight: 1.1 }}>Geist</div>
          <div style={{ fontFamily: FONT, fontSize: 13, color: T.ink3, marginTop: 4 }}>Primary · UI &amp; headings</div>
          <div style={{ fontFamily: MONO, fontSize: 18, color: T.ink2, marginTop: 12, letterSpacing: -0.2 }}>Geist Mono</div>
          <div style={{ fontFamily: FONT, fontSize: 13, color: T.ink3, marginTop: 4 }}>Metrics · timestamps · IDs</div>
        </div>
        <div>
          <div style={{ fontFamily: FONT, fontSize: 12, fontWeight: 600, color: T.ink3, textTransform: 'uppercase', letterSpacing: 0.4, marginBottom: 10 }}>Platform notes</div>
          <div style={{ fontFamily: FONT, fontSize: 13, color: T.ink2, lineHeight: 1.55 }}>
            Designed platform-agnostic. Chrome adapts:<br/>
            <b>iOS:</b> back chevrons, share sheets, haptic on check-in.<br/>
            <b>Android:</b> Material bottom nav, ripple, system share.<br/>
            Tap targets ≥ 44px throughout.
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(app);
</script>

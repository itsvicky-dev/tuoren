<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Tuoren Medical — Leads (Doctors)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --sidebar-bg: #0f1b35;
            --sidebar-active-bg: rgba(26, 86, 219, 0.22);
            --sidebar-active-border: #1a56db;
            --sidebar-text: rgba(255, 255, 255, 0.55);
            --sidebar-text-active: #ffffff;
            --sidebar-divider: rgba(255, 255, 255, 0.08);

            --brand: #1a56db;
            --brand-soft: #e8f0fe;
            --brand-text: #1e40af;

            --bg: #f0f2f5;
            --surface: #ffffff;
            --border: rgba(0, 0, 0, 0.08);
            --border-strong: rgba(0, 0, 0, 0.14);

            --text: #111827;
            --text-2: #374151;
            --text-3: #6b7280;
            --text-4: #9ca3af;

            --font: 'Inter', system-ui, sans-serif;
            --mono: 'JetBrains Mono', monospace;

            --r-sm: 6px;
            --r-md: 8px;
            --r-lg: 10px;
            --r-pill: 20px;
        }

        html,
        body {
            height: 100%;
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            font-size: 13px;
        }

        /* ── Layout shell ── */
        .app {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 180px;
            flex-shrink: 0;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 18px 16px 14px;
            border-bottom: 1px solid var(--sidebar-divider);
        }

        .logo-mark {
            width: 30px;
            height: 30px;
            background: var(--brand);
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;
            flex-shrink: 0;
        }

        .logo-name {
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.2px;
            line-height: 1;
        }

        .logo-name em {
            color: #ef4444;
            font-style: normal;
        }

        .nav {
            flex: 1;
            padding: 8px 0;
            overflow-y: auto;
        }

        .nav::-webkit-scrollbar {
            display: none;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 8px 14px;
            color: var(--sidebar-text);
            font-size: 12.5px;
            font-weight: 400;
            cursor: pointer;
            border-left: 2.5px solid transparent;
            transition: background 0.1s, color 0.1s;
            white-space: nowrap;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.82);
        }

        .nav-item.active {
            background: var(--sidebar-active-bg);
            border-left-color: var(--sidebar-active-border);
            color: var(--sidebar-text-active);
            font-weight: 500;
        }

        .nav-item svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .nav-bottom {
            border-top: 1px solid var(--sidebar-divider);
            padding: 6px 0;
        }

        /* ── Main ── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        /* ── Topbar ── */
        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 20px;
            height: 52px;
            flex-shrink: 0;
        }

        .topbar-hamburger {
            color: var(--text-3);
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .topbar-hamburger svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
        }

        .topbar-search {
            flex: 1;
            max-width: 420px;
            position: relative;
        }

        .topbar-search input {
            width: 100%;
            background: #f5f6f8;
            border: 1px solid var(--border-strong);
            border-radius: var(--r-md);
            padding: 7px 60px 7px 32px;
            font-size: 12.5px;
            font-family: var(--font);
            color: var(--text);
            outline: none;
        }

        .topbar-search input:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 2px rgba(26, 86, 219, 0.12);
        }

        .topbar-search .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-4);
            display: flex;
        }

        .topbar-search .search-icon svg {
            width: 15px;
            height: 15px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .topbar-search kbd {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: #e5e7eb;
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 10px;
            color: var(--text-3);
            font-family: var(--mono);
        }

        .topbar-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .icon-btn {
            width: 34px;
            height: 34px;
            border-radius: var(--r-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-3);
            cursor: pointer;
            background: none;
            border: none;
            position: relative;
            transition: background 0.1s;
        }

        .icon-btn:hover {
            background: #f3f4f6;
        }

        .icon-btn svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .icon-btn.accent svg {
            color: var(--brand);
            width: 20px;
            height: 20px;
        }

        .notif-badge {
            position: absolute;
            top: 4px;
            right: 3px;
            background: #ef4444;
            color: #fff;
            font-size: 9px;
            font-weight: 700;
            font-family: var(--mono);
            border-radius: 10px;
            padding: 1px 4px;
            min-width: 15px;
            text-align: center;
            line-height: 14px;
        }

        .topbar-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--brand);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            flex-shrink: 0;
        }

        .topbar-user {
            display: flex;
            flex-direction: column;
            margin-left: 2px;
        }

        .topbar-user-name {
            font-size: 12.5px;
            font-weight: 500;
            color: var(--text);
        }

        .topbar-user-role {
            font-size: 10.5px;
            color: var(--text-3);
        }

        .topbar-caret {
            color: var(--text-4);
            cursor: pointer;
            background: none;
            border: none;
            display: flex;
            align-items: center;
        }

        .topbar-caret svg {
            width: 14px;
            height: 14px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }

        /* ── Content area ── */
        .content {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* ── Filter sidebar ── */
        .filter-panel {
            width: 210px;
            flex-shrink: 0;
            background: var(--surface);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 14px 0;
        }

        .filter-panel::-webkit-scrollbar {
            width: 4px;
        }

        .filter-panel::-webkit-scrollbar-thumb {
            background: #e5e7eb;
            border-radius: 4px;
        }

        .filter-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 14px 10px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-clear {
            color: var(--brand);
            font-weight: 500;
            cursor: pointer;
            text-transform: none;
            letter-spacing: 0;
            font-size: 11px;
        }

        .filter-group {
            padding: 10px 14px 8px;
            border-top: 1px solid var(--border);
        }

        .filter-group-label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-2);
            margin-bottom: 8px;
        }

        .filter-group-label svg {
            width: 12px;
            height: 12px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            color: var(--text-4);
        }

        .filter-select {
            width: 100%;
            background: #f5f6f8;
            border: 1px solid var(--border-strong);
            border-radius: var(--r-sm);
            padding: 6px 8px;
            font-size: 12px;
            font-family: var(--font);
            color: var(--text);
            outline: none;
            cursor: pointer;
        }

        .stage-row {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 3.5px 0;
            cursor: pointer;
        }

        .stage-checkbox {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            border: 1.5px solid #d1d5db;
            background: #fff;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stage-checkbox.checked {
            background: var(--brand);
            border-color: var(--brand);
        }

        .stage-checkbox.checked svg {
            display: block;
        }

        .stage-checkbox svg {
            display: none;
            width: 9px;
            height: 9px;
            stroke: #fff;
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .stage-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .stage-label {
            font-size: 12px;
            color: var(--text);
            flex: 1;
        }

        .stage-count {
            font-size: 11px;
            color: var(--text-4);
            font-family: var(--mono);
        }

        /* ── Body ── */
        .body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .body::-webkit-scrollbar {
            width: 6px;
        }

        .body::-webkit-scrollbar-thumb {
            background: #e5e7eb;
            border-radius: 4px;
        }

        /* ── Page header ── */
        .page-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 18px;
        }

        .page-title-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-h1 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.5px;
        }

        .count-pill {
            background: var(--brand-soft);
            color: var(--brand-text);
            font-size: 12.5px;
            font-weight: 700;
            padding: 3px 11px;
            border-radius: var(--r-pill);
            font-family: var(--mono);
        }

        .page-sub {
            font-size: 12px;
            color: var(--text-3);
            margin-top: 4px;
        }

        .page-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .leads-search {
            position: relative;
        }

        .leads-search input {
            background: var(--surface);
            border: 1px solid var(--border-strong);
            border-radius: var(--r-md);
            padding: 7px 10px 7px 30px;
            font-size: 12px;
            font-family: var(--font);
            color: var(--text);
            outline: none;
            width: 200px;
        }

        .leads-search input:focus {
            border-color: var(--brand);
        }

        .leads-search svg {
            position: absolute;
            left: 9px;
            top: 50%;
            transform: translateY(-50%);
            width: 14px;
            height: 14px;
            stroke: var(--text-4);
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 7px 11px;
            border-radius: var(--r-md);
            font-size: 12.5px;
            font-family: var(--font);
            cursor: pointer;
            border: none;
            white-space: nowrap;
        }

        .btn-ghost {
            background: var(--surface);
            border: 1px solid var(--border-strong);
            color: var(--text-2);
        }

        .btn-ghost:hover {
            background: #f3f4f6;
        }

        .btn-ghost svg {
            width: 15px;
            height: 15px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .btn-sort {
            background: var(--surface);
            border: 1px solid var(--border-strong);
            color: var(--text);
            font-weight: 400;
        }

        .btn-sort svg {
            width: 12px;
            height: 12px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }

        .btn-primary {
            background: var(--brand);
            color: #fff;
            font-weight: 500;
        }

        .btn-primary:hover {
            background: #1447c0;
        }

        .btn-primary svg {
            width: 14px;
            height: 14px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2.2;
            stroke-linecap: round;
        }

        .view-toggle {
            display: flex;
            border: 1px solid var(--border-strong);
            border-radius: var(--r-md);
            overflow: hidden;
        }

        .view-btn {
            background: var(--surface);
            border: none;
            padding: 7px 10px;
            color: var(--text-3);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.1s;
        }

        .view-btn svg {
            width: 15px;
            height: 15px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .view-btn.active {
            background: var(--brand);
            color: #fff;
        }

        .view-btn+.view-btn {
            border-left: 1px solid var(--border-strong);
        }

        /* ── Cards grid ── */
        .leads-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        @media (max-width: 1200px) {
            .leads-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }

        @media (max-width: 900px) {
            .leads-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        .lead-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            padding: 14px;
            cursor: pointer;
            transition: box-shadow 0.15s;
        }

        .lead-card:hover {
            box-shadow: 0 2px 14px rgba(0, 0, 0, 0.09);
            border-color: var(--border-strong);
        }

        .card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
        }

        .card-identity {
            display: flex;
            align-items: flex-start;
            gap: 9px;
            min-width: 0;
        }

        .card-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .card-meta {
            min-width: 0;
        }

        .card-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-spec {
            font-size: 11px;
            color: var(--text-3);
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .card-hosp {
            font-size: 11px;
            color: var(--text-2);
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-spec svg,
        .card-hosp svg {
            width: 11px;
            height: 11px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }

        .status-pill {
            font-size: 10px;
            font-weight: 500;
            padding: 3px 8px;
            border-radius: var(--r-pill);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .card-divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 10px 0 8px;
        }

        .card-activity {
            font-size: 11px;
            color: var(--text-3);
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 9px;
        }

        .card-activity svg {
            width: 12px;
            height: 12px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }

        .card-actions {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .action-btn {
            width: 28px;
            height: 28px;
            border-radius: var(--r-sm);
            border: 1px solid var(--border-strong);
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-3);
            cursor: pointer;
            transition: background 0.1s, color 0.1s;
        }

        .action-btn:hover {
            background: #f3f4f6;
            color: var(--text);
        }

        .action-btn svg {
            width: 13px;
            height: 13px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .action-more {
            margin-left: auto;
        }

        /* ── Pagination ── */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 4px;
        }

        .pagination-info {
            font-size: 12px;
            color: var(--text-3);
        }

        .pagination-pages {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .page-btn {
            width: 30px;
            height: 30px;
            border-radius: var(--r-sm);
            border: 1px solid var(--border-strong);
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: var(--text-2);
            cursor: pointer;
            font-family: var(--mono);
            transition: background 0.1s;
        }

        .page-btn:hover {
            background: #f3f4f6;
        }

        .page-btn.active {
            background: var(--brand);
            color: #fff;
            border-color: var(--brand);
        }

        .page-btn.dots {
            border: none;
            background: none;
            color: var(--text-4);
            cursor: default;
        }

        .page-btn svg {
            width: 12px;
            height: 12px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .per-page-row {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 12px;
            color: var(--text-3);
        }

        .per-page-row select {
            background: var(--surface);
            border: 1px solid var(--border-strong);
            border-radius: var(--r-sm);
            padding: 4px 6px;
            font-size: 12px;
            font-family: var(--font);
            outline: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="app">

        <!-- ── Sidebar ── -->
        <nav class="sidebar">
            <div class="sidebar-logo">
                <div class="logo-mark">T</div>
                <div class="logo-name">TOUREN<em>✓</em> MEDICAL</div>
            </div>

            <div class="nav" id="nav"></div>

            <div class="nav-bottom" id="nav-bottom"></div>
        </nav>

        <!-- ── Main ── -->
        <div class="main">

            <!-- Topbar -->
            <header class="topbar">
                <button class="topbar-hamburger" aria-label="Toggle menu">
                    <svg viewBox="0 0 20 20">
                        <path d="M3 5h14M3 10h14M3 15h14" />
                    </svg>
                </button>

                <div class="topbar-search">
                    <span class="search-icon">
                        <svg viewBox="0 0 20 20">
                            <circle cx="9" cy="9" r="6" />
                            <path d="M15 15l-3-3" />
                        </svg>
                    </span>
                    <input type="text" placeholder="Search leads, doctors, hospitals, products…"
                        aria-label="Global search">
                    <kbd>⌘K</kbd>
                </div>

                <div class="topbar-right">
